<!DOCTYPE html>
<html>
<head>
    <title>Events Debug</title>
</head>
<body>
    <h1>Events Synchronization Debug</h1>
    <div id="output"></div>
    
    <script>
        console.log('=== EVENTS SYNCHRONIZATION DEBUG ===');
        const output = document.getElementById('output');
        
        function log(message) {
            console.log(message);
            output.innerHTML += '<pre>' + message + '</pre>';
        }
        
        // Check what's in localStorage
        try {
            const storedEvents = localStorage.getItem('mosque_events');
            if (storedEvents) {
                const events = JSON.parse(storedEvents);
                log('Events in localStorage: ' + events.length);
                log('Stored events:');
                events.forEach(e => {
                    log(`  - ${e.title} (${e.date}) - ${e.status}`);
                });
            } else {
                log('No events in localStorage');
            }
        } catch (error) {
            log('Error reading localStorage: ' + error.message);
        }
        
        log('\n=== END DEBUG ===');
    </script>
</body>
</html>
