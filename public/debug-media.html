    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug { background: #f5f5f5; padding: 10px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        pre { background: #f8f8f8; padding: 10px; overflow-x: auto; }

<body>
    <h1>Media Synchronization Debug</h1>
    <button onclick="checkLocalStorage()">Check LocalStorage</button>
    <button onclick="resetToDefaults()">Reset to Defaults</button>

    <div id="output"></div>
    
    <script>
        function checkLocalStorage() {
            const output = document.getElementById('output');
            let html = '<div class="debug"><h3>LocalStorage Check</h3>';
            
            try {
                // Check mosque_media key
                const mosqueMedia = localStorage.getItem('mosque_media');
                html += `<p>mosque_media exists: ${!!mosqueMedia}</p>`;
                
                if (mosqueMedia) {
                    const parsed = JSON.parse(mosqueMedia);
                    html += `<p>Total media items: ${parsed.length}</p>`;
                    
                    // Count by type
                    const audioCount = parsed.filter(m => m.type === 'audio').length;
                    const videoCount = parsed.filter(m => m.type === 'video').length;
                    const imageCount = parsed.filter(m => m.type === 'image').length;
                    
                    html += `<p>Audio: ${audioCount}, Video: ${videoCount}, Image: ${imageCount}</p>`;
                    
                    html += '<h4>All Media Items:</h4>';
                    html += '<pre>' + JSON.stringify(parsed, null, 2) + '</pre>';
                } else {
                    html += '<p class="error">No mosque_media found in localStorage</p>';
                }
                
                // Check all keys
                const keys = Object.keys(localStorage);
                html += `<h4>All LocalStorage Keys:</h4><p>${keys.join(', ')}</p>`;
                
            } catch (error) {
                html += `<p class="error">Error: ${error.message}</p>`;
            }
            
            html += '</div>';
            output.innerHTML = html;
        }

        function clearAll() {
